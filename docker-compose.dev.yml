# 🐳 Docker Compose para Desarrollo de Chef at Home
# Versión simplificada para desarrollo local

services:
  # 🚀 Aplicación Next.js para desarrollo
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=your_super_secret_jwt_key_here_make_it_long_and_random_123456789
      - JWT_EXPIRES_IN=7d
      - UNSPLASH_ACCESS_KEY=U6EYE-_XmRws3uia01ea6cTvNAPW4dmo1Wag984yK8U
      - GOOGLE_GEMINI_API_KEY=AIzaSyACgH5mKEb_jWUaAay65ZAUAwJGwEw65bg%
    volumes:
      # Montar el código fuente para hot reload
      - .:/app
      - /app/node_modules
      - /app/.next
    stdin_open: true
    tty: true
    restart: unless-stopped

# 🌐 Red personalizada
networks:
  default:
    driver: bridge
