version: "3.8"

services:
  stable-diffusion:
    image: ghcr.io/automatic1111/stable-diffusion-webui:latest
    container_name: chef-at-home-stable-diffusion
    ports:
      - "7860:7860" # Web UI
      - "7861:7861" # API (si se habilita)
    volumes:
      - ./stable-diffusion/models:/app/models
      - ./stable-diffusion/outputs:/app/outputs
      - ./stable-diffusion/config:/app/config
      - ./stable-diffusion/extensions:/app/extensions
    environment:
      - CLI_ARGS=--api --listen --port 7860 --api-port 7861
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - chef-at-home-network

networks:
  chef-at-home-network:
    external: true
