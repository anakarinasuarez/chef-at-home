# 🐳 Docker Compose para Chef at Home
# Orquesta múltiples servicios en contenedores

services:
  # 🚀 Aplicación Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://chef_user:chef_password@database:5432/chef_at_home
      - REDIS_URL=redis://redis:6379
    depends_on:
      - database
      - redis
    restart: unless-stopped
    networks:
      - chef-network

  # 🗄️ Base de datos PostgreSQL
  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=chef_at_home
      - POSTGRES_USER=chef_user
      - POSTGRES_PASSWORD=chef_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - chef-network

  # 🔴 Redis para cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - chef-network

  # 📧 Mailhog para testing de emails (opcional)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    restart: unless-stopped
    networks:
      - chef-network

# 📦 Volúmenes para persistir datos
volumes:
  postgres_data:
  redis_data:

# 🌐 Red personalizada para comunicación entre servicios
networks:
  chef-network:
    driver: bridge
